<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qpedia</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="shared.css" />
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    /* ══════════════════════════════════════════════════════════
       BASE — light background, dot grid, ambient orb
    ══════════════════════════════════════════════════════════ */
    .splash {
      min-height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      overflow: hidden;
      background: radial-gradient(ellipse 85% 85% at 50% 50%, #FFFFFF 0%, #E8EFF6 100%);
    }

    .splash::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(13, 43, 62, 0.07) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    .splash::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(43, 143, 214, 0.09) 0%, transparent 68%);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: ambientPulse 5s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes ambientPulse {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }

      50% {
        transform: translate(-50%, -50%) scale(1.18);
        opacity: 0.5;
      }
    }

    /* ══════════════════════════════════════════════════════════
       DARK OVERLAY — near-black burn reveals light bg
    ══════════════════════════════════════════════════════════ */
    #dark-overlay {
      position: absolute;
      inset: 0;
      background: #020C14;
      z-index: 2;
      opacity: 1;
      transition: opacity 1.6s cubic-bezier(0.4, 0, 0.2, 1) 0.3s;
      pointer-events: none;
    }

    #dark-overlay.fade-out {
      opacity: 0;
    }

    /* ══════════════════════════════════════════════════════════
       SPLASH ROW
    ══════════════════════════════════════════════════════════ */
    #splash-row {
      position: relative;
      z-index: 3;
      display: flex;
      align-items: center;
    }

    /* ══════════════════════════════════════════════════════════
       LOGO
    ══════════════════════════════════════════════════════════ */
    #splash-logo {
      width: 600px;
      max-height: 90vh;
      object-fit: contain;
      flex-shrink: 0;
      display: block;
      pointer-events: none;
      opacity: 0;
      animation: logoEntrance 1.6s cubic-bezier(0.22, 1, 0.36, 1) 0.6s forwards;
    }

    @keyframes logoEntrance {
      from {
        opacity: 0;
        transform: scale(0.75);
        filter: blur(24px);
      }

      to {
        opacity: 1;
        transform: scale(1);
        filter: blur(0px);
      }
    }

    /* ══════════════════════════════════════════════════════════
       GLOW RING
    ══════════════════════════════════════════════════════════ */
    #glow-ring {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.85);
      border: 1.5px solid rgba(43, 143, 214, 0);
      pointer-events: none;
      z-index: 3;
    }

    #glow-ring.burst {
      animation: glowBurst 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes glowBurst {
      0% {
        transform: translate(-50%, -50%) scale(0.85);
        border-color: rgba(43, 143, 214, 0.5);
        box-shadow: 0 0 40px rgba(43, 143, 214, 0.18), inset 0 0 30px rgba(43, 143, 214, 0.07);
      }

      100% {
        transform: translate(-50%, -50%) scale(1.75);
        border-color: rgba(43, 143, 214, 0);
        box-shadow: 0 0 0 rgba(43, 143, 214, 0);
      }
    }

    /* ══════════════════════════════════════════════════════════
       HINT TEXT
    ══════════════════════════════════════════════════════════ */
    #splash-hint {
      position: absolute;
      bottom: 52px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--qp-text-3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
      opacity: 0;
      animation: hintFadeIn 0.6s ease 3s forwards, hintPulse 2.8s ease-in-out 3.6s infinite;
      transition: opacity 0.35s ease;
      z-index: 3;
      pointer-events: none;
    }

    #splash-hint.hidden {
      opacity: 0 !important;
      animation: none;
    }

    @keyframes hintFadeIn {
      to {
        opacity: 0.7;
      }
    }

    @keyframes hintPulse {

      0%,
      100% {
        opacity: 0.4;
      }

      50% {
        opacity: 0.85;
      }
    }

    /* ══════════════════════════════════════════════════════════
       BUTTON GROUP
    ══════════════════════════════════════════════════════════ */
    #btn-group {
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow: hidden;
    }

    #btn-group-heading {
      font-size: 11px;
      font-weight: 500;
      font-family: 'Inter', system-ui, sans-serif;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--qp-text-3);
      padding: 0 4px 14px 4px;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    #btn-group-heading.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .btn-wrap {
      overflow: visible;
      padding: 5px 0;
    }

    /* Ghost button — transparent, barely-there border, dark text */
    .splash-btn {
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
      width: 300px;
      padding: 15px 24px;

      background: transparent;
      border: 1px solid rgba(13, 43, 62, 0.14);
      border-radius: 14px;

      color: var(--qp-navy);
      font-size: 17px;
      font-weight: 600;
      font-family: 'Inter', system-ui, sans-serif;
      letter-spacing: 0.01em;
      text-decoration: none;
      white-space: nowrap;

      opacity: 0;
      transform: translateX(20px) scale(0.95);
      pointer-events: none;

      transition:
        opacity 0.32s ease,
        transform 0.28s ease-out,
        border-color 0.28s ease-out,
        box-shadow 0.28s ease-out,
        background 0.28s ease-out;
    }

    .splash-btn::before {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 22px;
      background: radial-gradient(ellipse at center, rgba(13, 43, 62, 0.07) 0%, transparent 70%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease-out;
      z-index: -1;
    }

    .btn-label {
      flex: 1;
    }

    .btn-arrow {
      font-size: 16px;
      color: rgba(13, 43, 62, 0.30);
      transition: transform 0.28s ease-out, color 0.28s ease-out;
      flex-shrink: 0;
    }

    .splash-btn.visible {
      opacity: 1;
      transform: translateX(0) scale(1);
      pointer-events: auto;
    }

    .btn-wrap .splash-btn.visible:hover {
      border-color: rgba(13, 43, 62, 0.65);
      background: rgba(13, 43, 62, 0.035);
      box-shadow: 0 4px 20px rgba(13, 43, 62, 0.09);
      transform: translateY(-2px) scale(1.02);
      transition:
        transform 0.15s ease-out,
        border-color 0.15s ease-out,
        box-shadow 0.15s ease-out,
        background 0.15s ease-out;
    }

    .btn-wrap .splash-btn.visible:hover::before {
      opacity: 1;
      transition: opacity 0.15s ease-out;
    }

    .btn-wrap .splash-btn.visible:hover .btn-arrow {
      transform: translateX(4px);
      color: var(--qp-navy);
      transition: transform 0.15s ease-out, color 0.15s ease-out;
    }

    /* ══════════════════════════════════════════════════════════
       DESKTOP
    ══════════════════════════════════════════════════════════ */
    @media (min-width: 769px) {
      #splash-row {
        gap: 0;
        transition: gap 0.45s ease-out;
      }

      #splash-row.revealed {
        gap: 72px;
      }

      #btn-group {
        width: 0;
        transition: width 0.45s ease-out;
      }

      #splash-row.revealed #btn-group {
        width: 312px;
      }
    }

    /* ══════════════════════════════════════════════════════════
       MOBILE
    ══════════════════════════════════════════════════════════ */
    @media (max-width: 768px) {
      #splash-row {
        flex-direction: column;
        align-items: center;
        gap: 0;
        transition: gap 0.45s ease-out;
      }

      #splash-row.revealed {
        gap: 40px;
      }

      #splash-logo {
        width: 240px;
      }

      #btn-group {
        width: 300px;
        max-height: 0;
        transition: max-height 0.5s ease-out;
        align-items: stretch;
      }

      #splash-row.revealed #btn-group {
        max-height: 480px;
      }

      .splash-btn {
        width: 100%;
      }

      #splash-hint {
        bottom: 36px;
        font-size: 11px;
      }

      .splash::before {
        width: 360px;
        height: 360px;
      }
    }
  </style>
</head>

<body>

  <div class="splash" id="splash">

    <div id="dark-overlay"></div>
    <div id="glow-ring"></div>

    <div id="splash-row">
      <img id="splash-logo" src="Logo_OpeningPage.png" alt="Qpedia" />

      <div id="btn-group">

        <div class="btn-wrap">
          <a class="splash-btn" href="01_homepage.html?intent=technology">
            <span class="btn-label">Technology</span><span class="btn-arrow">→</span>
          </a>
        </div>
        <div class="btn-wrap">
          <a class="splash-btn" href="01_homepage.html?intent=discover">
            <span class="btn-label">Discover</span><span class="btn-arrow">→</span>
          </a>
        </div>
        <div class="btn-wrap">
          <a class="splash-btn" href="01_homepage.html?intent=business">
            <span class="btn-label">Business</span><span class="btn-arrow">→</span>
          </a>
        </div>
        <div class="btn-wrap">
          <a class="splash-btn" href="01_homepage.html?intent=opportunities">
            <span class="btn-label">Opportunities</span><span class="btn-arrow">→</span>
          </a>
        </div>
      </div>
    </div>

    <p id="splash-hint">Click anywhere to begin</p>

  </div>

  <script>
    const overlay = document.getElementById('dark-overlay');
    const glowRing = document.getElementById('glow-ring');
    const splash = document.getElementById('splash');
    const splashRow = document.getElementById('splash-row');
    const btnGroup = document.getElementById('btn-group');
    const heading = document.getElementById('btn-group-heading');
    const hint = document.getElementById('splash-hint');
    const buttons = document.querySelectorAll('.splash-btn');
    let revealed = false;

    setTimeout(function () { overlay.classList.add('fade-out'); }, 300);
    setTimeout(function () { glowRing.classList.add('burst'); }, 2200);

    splash.addEventListener('click', function (e) {
      if (e.target.closest('.splash-btn')) return;
      if (revealed) return;

      revealed = true;
      splash.style.cursor = 'default';
      hint.classList.add('hidden');
      splashRow.classList.add('revealed');

      setTimeout(function () { heading.classList.add('visible'); }, 280);

      buttons.forEach(function (btn, i) {
        setTimeout(function () { btn.classList.add('visible'); }, 380 + i * 110);
      });

      setTimeout(function () {
        btnGroup.style.overflow = 'visible';
        buttons.forEach(function (btn) { btn.style.transitionDelay = '0s'; });
      }, 1300);
    });
  </script>

</body>

</html>
